<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF9E7"/>
      <stop offset="100%" style="stop-color:#F5EFE5"/>
    </linearGradient>
    <linearGradient id="cakeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#8B5A2B"/>
    </linearGradient>
    <linearGradient id="frostingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFEF7"/>
      <stop offset="100%" style="stop-color:#F5EFE5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bgGrad)" width="800" height="600"/>
  
  <!-- Cupcake wrapper base -->
  <path d="M320 400 Q320 450 350 480 L450 480 Q480 450 480 400 Z" fill="#8B5A2B"/>
  
  <!-- Wrapper pleats/lines -->
  <path d="M330 410 L360 480" stroke="#6F4722" stroke-width="2" fill="none"/>
  <path d="M350 400 L380 480" stroke="#6F4722" stroke-width="2" fill="none"/>
  <path d="M370 395 L400 480" stroke="#6F4722" stroke-width="2" fill="none"/>
  <path d="M390 395 L420 480" stroke="#6F4722" stroke-width="2" fill="none"/>
  <path d="M410 395 L440 480" stroke="#6F4722" stroke-width="2" fill="none"/>
  <path d="M430 400 L460 480" stroke="#6F4722" stroke-width="2" fill="none"/>
  <path d="M450 410 L470 480" stroke="#6F4722" stroke-width="2" fill="none"/>
  
  <!-- Frosting swirl layers -->
  <ellipse cx="400" cy="340" rx="90" ry="60" fill="url(#frostingGrad)"/>
  <ellipse cx="400" cy="300" rx="70" ry="50" fill="#FEF9E7"/>
  <ellipse cx="400" cy="270" rx="50" ry="35" fill="#F5EFE5"/>
  <ellipse cx="400" cy="250" rx="30" ry="25" fill="#FEF9E7"/>
  
  <!-- Decorative swirl on top -->
  <circle cx="400" cy="230" r="15" fill="url(#cakeGrad)"/>
  
  <!-- Cherry on top -->
  <circle cx="400" cy="210" r="20" fill="#C41E3A"/>
  <ellipse cx="395" cy="205" rx="5" ry="3" fill="#FF6B6B" opacity="0.6"/>
  
  <!-- Cherry stem -->
  <path d="M400 195 Q410 180 420 190" stroke="#2D5A27" stroke-width="3" fill="none"/>
  
  <!-- Sparkles/highlights -->
  <circle cx="340" cy="280" r="3" fill="#D4AF37"/>
  <circle cx="460" cy="300" r="3" fill="#D4AF37"/>
  <circle cx="380" cy="320" r="2" fill="#D4AF37"/>
  <circle cx="420" cy="260" r="2" fill="#D4AF37"/>
  <circle cx="350" cy="340" r="2.5" fill="#D4AF37"/>
  <circle cx="450" cy="330" r="2.5" fill="#D4AF37"/>
  
  <!-- Text -->
  <text x="400" y="550" font-family="Georgia, serif" font-size="28" fill="#8B5A2B" text-anchor="middle" font-weight="600">Artisan Cupcakes</text>
</svg>
